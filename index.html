<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH-CORE | Volumetric Architectural Registry</title>
    <style>
        :root {
            --bg: #0a0b0d; 
            --panel: #14161a;
            --accent: #d4af37; 
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8;
            --text-bright: #f8fafc;
        }

        * { box-sizing: border-box; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-bright);
            overflow-x: hidden;
        }

        header {
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 11, 13, 0.9);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-weight: 900; letter-spacing: 6px; text-transform: uppercase; color: var(--accent); font-size: 0.8rem; }

        /* --- Gallery Grid --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 1px;
            background: var(--border);
        }

        .house-card {
            background: var(--bg);
            padding: 40px;
            cursor: pointer;
            position: relative;
        }

        .house-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent); transform: scaleX(0); transform-origin: left;
            transition: transform 0.6s ease;
        }

        .house-card:hover::before { transform: scaleX(1); }
        .house-card:hover { background: var(--panel); }

        .card-img { 
            width: 100%; 
            aspect-ratio: 16/9; 
            object-fit: cover; 
            opacity: 0.6;
            filter: sepia(20%) contrast(1.1);
            border: 1px solid var(--border);
        }

        .house-card:hover .card-img { opacity: 1; filter: sepia(0%); transform: translateY(-5px); border-color: var(--accent); }

        /* --- 3D Viewer Modal --- */
        #viewer-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: none;
            grid-template-columns: 1fr 500px;
        }

        .stage-3d {
            display: flex; align-items: center; justify-content: center;
            perspective: 2500px;
            cursor: grab;
            background: radial-gradient(circle at center, #1e293b 0%, #0a0b0d 100%);
        }

        .house-volume {
            width: 450px; height: 300px;
            position: relative;
            transform-style: preserve-3d;
            animation: slowOrbit 40s linear infinite;
        }

        @keyframes slowOrbit {
            from { transform: rotateX(-15deg) rotateY(0deg); }
            to { transform: rotateX(-15deg) rotateY(360deg); }
        }

        .face {
            position: absolute;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex; align-items: flex-end; padding: 15px;
            font-size: 0.5rem; color: var(--accent); font-weight: bold;
            background-color: #1a1a1a;
        }

        .front { width: 450px; height: 300px; transform: translateZ(150px); }
        .back  { width: 450px; height: 300px; transform: rotateY(180deg) translateZ(150px); filter: brightness(0.35); }
        .left  { width: 300px; height: 300px; transform: rotateY(-90deg) translateZ(225px); filter: brightness(0.5); }
        .right { width: 300px; height: 300px; transform: rotateY(90deg) translateZ(225px); filter: brightness(0.5); }
        .top   { width: 450px; height: 300px; transform: rotateX(90deg) translateZ(150px); background: #111; border-color: #333; }

        /* --- Technical Details Panel --- */
        .side-info {
            padding: 80px 50px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            overflow-y: auto;
        }

        .section-header {
            font-size: 0.65rem; letter-spacing: 3px; color: var(--accent);
            text-transform: uppercase; margin: 30px 0 15px 0;
            border-bottom: 1px solid var(--border); padding-bottom: 8px;
        }

        .feature-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 20px; margin-bottom: 15px;
        }

        .feature-box h4 { margin: 0 0 8px 0; font-size: 0.85rem; color: var(--text-bright); text-transform: uppercase; }
        .feature-box p { margin: 0; font-size: 0.8rem; color: var(--text-dim); line-height: 1.6; }

        .price-tag { font-size: 2.8rem; font-weight: 200; color: var(--accent); margin: 20px 0; }

        .close-trigger {
            position: absolute; top: 40px; left: 40px;
            background: none; border: 1px solid var(--accent); color: var(--accent);
            padding: 10px 20px; cursor: pointer; z-index: 1100;
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px;
        }

        @media (max-width: 1100px) {
            #viewer-modal { grid-template-columns: 1fr; }
            .side-info { height: 60vh; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Arch-Archive Volumetric Registry</div>
    <div style="font-size: 0.6rem; color: var(--text-dim);">EXTENDED EDITION v.4.2 [FIXED ASSETS]</div>
</header>

<main class="gallery" id="mainGrid"></main>

<div id="viewer-modal">
    <button class="close-trigger" onclick="closeViewer()">← Exit Registry</button>
    <div class="stage-3d" id="stage">
        <div class="house-volume" id="houseBox">
            <div class="face front">FRONT_ELEVATION</div>
            <div class="face back">REAR_ORIENTATION</div>
            <div class="face left">PROFILE_ALPHA</div>
            <div class="face right">PROFILE_BETA</div>
            <div class="face top">ROOF_TOPOLOGY</div>
        </div>
    </div>
    <div class="side-info" id="infoPanel"></div>
</div>

<script>
    const houseDB = [
        {
            name: "The Obsidian Atrium",
            price: "$4,850,000",
            img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80",
            loc: "Zurich, Switzerland",
            structural: "Carbon-fiber reinforced shell with seismic dampers.",
            thermal: "U-Value 0.12 W/m²K. Triple-glazed tinting glass.",
            systems: "AI HVAC, Tesla Powerwall 3, Biometric access.",
            materials: "Basalt stone, blackened steel, smoked oak.",
            specs: "6,200 SQ.FT • 5 SUITES • 6.5 BATH"
        },
        {
            name: "Eco-Timber Horizon",
            price: "$3,120,000",
            img: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=800&q=80",
            loc: "Vancouver, Canada",
            structural: "CLT skeleton for a carbon-negative footprint.",
            thermal: "Wood-fiber insulation, passive heat orientation.",
            systems: "Greywater reclamation, 25kW solar roof.",
            materials: "Red cedar, exposed CLT, polished concrete.",
            specs: "4,400 SQ.FT • 3 SUITES • 4 BATH"
        },
        {
            name: "Steel Shadow Pavilion",
            price: "$7,200,000",
            // FIXED PHOTO LINK BELOW
            img: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80",
            loc: "Kyoto, Japan",
            structural: "Steel exoskeleton for column-free 60ft spans.",
            thermal: "VIP argon-filled panels, radiant cooling.",
            systems: "Crestron automation, HEPA filtration.",
            materials: "Sandblasted steel, white Carrara marble.",
            specs: "8,900 SQ.FT • 6 SUITES • 8 BATH"
        },
        {
            name: "The Desert Monolith",
            price: "$3,900,000",
            img: "https://images.unsplash.com/photo-1480074568708-e7b720bb3f09?auto=format&fit=crop&w=800&q=80",
            loc: "Sedona, USA",
            structural: "Stone-bonded concrete for thermal mass storage.",
            thermal: "Low-E sand-resistant glass, passive airflow.",
            systems: "Deep-well cooling, smart irrigation for xeriscape.",
            materials: "Sandstone, copper accents, structural clay.",
            specs: "5,100 SQ.FT • 4 SUITES • 5 BATH"
        },
        {
            name: "Glass Canyonside",
            price: "$5,450,000",
            img: "https://images.unsplash.com/photo-1449844908441-8829872d2607?auto=format&fit=crop&w=800&q=80",
            loc: "Malibu, USA",
            structural: "Cantilevered steel platform anchored to bedrock.",
            thermal: "Photovoltaic glass walls, heat-recovery ventilation.",
            systems: "Smart-blind automation, salt-water pool systems.",
            materials: "Anodized aluminum, tempered glass, slate.",
            specs: "7,300 SQ.FT • 5 SUITES • 6 BATH"
        },
        {
            name: "The Arctic Brutalist",
            price: "$6,100,000",
            img: "https://images.unsplash.com/photo-1518780664697-55e3ad937233?auto=format&fit=crop&w=800&q=80",
            loc: "Tromsø, Norway",
            structural: "Insulated concrete forms (ICF) for extreme cold.",
            thermal: "Geothermal floor grid, quadruple-glazing.",
            systems: "Aurora-viewing automation, snow-melt driveway.",
            materials: "Raw concrete, dark spruce, granite floor.",
            specs: "6,800 SQ.FT • 4 SUITES • 5 BATH"
        }
    ];

    const grid = document.getElementById('mainGrid');
    const modal = document.getElementById('viewer-modal');
    const houseBox = document.getElementById('houseBox');

    houseDB.forEach((h, i) => {
        grid.innerHTML += `
            <div class="house-card" onclick="openViewer(${i})">
                <img src="${h.img}" class="card-img">
                <div style="margin-top:30px">
                    <div style="color:var(--accent); font-size:0.6rem; letter-spacing:2px; margin-bottom:10px">REGISTRY ID: ARC-0${i+1}</div>
                    <h2 style="margin:0; font-weight:300; font-size:1.4rem; letter-spacing:1px">${h.name}</h2>
                    <p style="color:var(--text-dim); font-size:0.8rem">${h.loc}</p>
                </div>
            </div>
        `;
    });

    function openViewer(i) {
        const h = houseDB[i];
        document.querySelectorAll('.face').forEach(f => f.style.backgroundImage = `url(${h.img})`);
        
        document.getElementById('infoPanel').innerHTML = `
            <div class="section-header">Technical Dossier</div>
            <h1 style="font-weight:200; font-size:2.8rem; margin:0">${h.name}</h1>
            <p style="color:var(--text-dim); font-size:0.85rem">${h.specs}</p>
            
            <div class="price-tag">${h.price}</div>

            <div class="section-header">Structural Systems</div>
            <div class="feature-box">
                <h4>Architecture</h4>
                <p>${h.structural}</p>
            </div>
            
            <div class="section-header">Environment & Tech</div>
            <div class="feature-box">
                <h4>Climate Control</h4>
                <p>${h.thermal}</p>
            </div>
            <div class="feature-box">
                <h4>Infrastructure</h4>
                <p>${h.systems}</p>
            </div>

            <div class="section-header">Tectonic Palette</div>
            <div class="feature-box">
                <h4>Materials</h4>
                <p>${h.materials}</p>
            </div>
        `;

        modal.style.display = 'grid';
        document.body.style.overflow = 'hidden';
    }

    function closeViewer() {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // 360 Rotation Physics
    let isDragging = false;
    let rY = 45; let rX = -15;
    let lastX, lastY;

    document.getElementById('stage').addEventListener('mousedown', (e) => {
        isDragging = true;
        houseBox.style.animation = 'none';
        lastX = e.clientX; lastY = e.clientY;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        rY += (e.clientX - lastX) * 0.4;
        rX -= (e.clientY - lastY) * 0.4;
        rX = Math.max(-45, Math.min(45, rX));
        houseBox.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
        lastX = e.clientX; lastY = e.clientY;
    });

    window.addEventListener('mouseup', () => isDragging = false);

    // Mobile Support
    document.getElementById('stage').addEventListener('touchstart', (e) => {
        isDragging = true;
        houseBox.style.animation = 'none';
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    });

    document.getElementById('stage').addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        rY += (e.touches[0].clientX - lastX) * 0.4;
        rX -= (e.touches[0].clientY - lastY) * 0.4;
        rX = Math.max(-45, Math.min(45, rX));
        houseBox.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    });

    window.addEventListener('touchend', () => isDragging = false);
</script>

</body>
</html>
